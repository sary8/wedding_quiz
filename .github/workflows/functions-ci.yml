name: Functions CI

on:
  push:
    branches: [main]
    paths:
      - 'src/functions/**'
      - '.github/workflows/functions-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/functions/**'
      - '.github/workflows/functions-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/functions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
