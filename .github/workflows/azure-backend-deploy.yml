name: Azure Backend Deploy

# - main への push（src/backend 変更時）→ development に自動デプロイ
# - 手動実行（workflow_dispatch）→ 選択した環境にデプロイ
#   （production には GitHub Environments の Required reviewers による承認を設定すること）
# 環境ごとの接続情報は GitHub Environments の Secrets / Variables から解決される:
#   Secrets:   AZURE_WEBAPP_PUBLISH_PROFILE / DATABASE_URL / DATABASE_AUTH_TOKEN
#   Variables: AZURE_WEBAPP_NAME

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
      - '.github/workflows/azure-backend-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        type: choice
        options:
          - development
          - production
        default: development

env:
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # production の OIDC 認証（azure/login）に必要
      contents: read
    env:
      # environment.name は env コンテキストを参照できないため式を二重に持つ（GitHub Actionsの制約）
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    environment:
      # push 起点は development 固定、手動実行は選択された環境
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
      url: ${{ steps.deploy_oidc.outputs.webapp-url || steps.deploy_profile.outputs.webapp-url }}
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies and build
        run: npm ci && npm run build

      # マイグレーションはデプロイ時にCIから対象環境のTursoへ適用する。
      # drizzle-kit は devDependency のため、App Service 起動時には実行できない
      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}

      - name: Reinstall production dependencies only
        run: npm ci --omit=dev

      # zipのルート直下に package.json / dist / node_modules を配置する。
      # App Service は wwwroot に展開してそのまま `npm start` を実行するため、
      # ルートに backend/ ディレクトリを挟むと package.json が見つからず起動に失敗する
      - name: Create deployment package
        run: zip -r ../../deploy-package.zip dist/ node_modules/ drizzle/ package.json drizzle.config.ts

      # 認証方式は環境で分岐する（Phase 3: OIDC化は production のみの方針）:
      # - production: フェデレーション資格情報による OIDC（長寿命シークレット不使用、基本認証もオフ）
      # - development: 従来どおり発行プロファイル認証
      # スタートアップコマンド `npm start` は App Service 側（構成 → 全般設定）で設定する
      - name: Azure login (OIDC)
        if: env.DEPLOY_ENV == 'production'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service (OIDC)
        if: env.DEPLOY_ENV == 'production'
        id: deploy_oidc
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: deploy-package.zip

      - name: Deploy to Azure App Service (publish profile)
        if: env.DEPLOY_ENV != 'production'
        id: deploy_profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-package.zip
