name: Azure Backend Deploy

# このワークフローは手動実行のみ（Azure App Service 設定後に使用）
# Azure設定が完了したら以下のコメントを外して push トリガーを有効化してください
#
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'src/backend/**'
#       - '.github/workflows/azure-backend-deploy.yml'
#   workflow_dispatch:

on:
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: wedding-quiz-backend  # Azure App Service のアプリ名に合わせて変更
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Reinstall production dependencies only
        run: npm ci --omit=dev

      - name: Create deployment package
        run: |
          cd ..
          zip -r ../deploy-package.zip backend/dist/ backend/node_modules/ backend/drizzle/ backend/package.json backend/drizzle.config.ts
        working-directory: src

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-package.zip
          startup-command: 'npm run db:migrate && npm start'
