name: Azure Static Web Apps CI/CD

# このワークフローはAzure設定後に有効化してください
# AZURE_STATIC_WEB_APPS_API_TOKEN が設定されている場合のみ実行されます

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    # Azure token が設定されている場合のみ実行
    if: |
      (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed'))
      && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/src/frontend"
          api_location: ""
          output_location: "dist"
          app_build_command: "npm run build"

  close_pull_request_job:
    # Azure token が設定されている場合のみ実行
    if: |
      github.event_name == 'pull_request' && github.event.action == 'closed'
      && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
