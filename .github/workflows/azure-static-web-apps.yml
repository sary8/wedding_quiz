name: Azure Static Web Apps CI/CD

# - main への push（src/frontend 変更時）→ development に自動デプロイ
# - 手動実行（workflow_dispatch）→ 選択した環境にデプロイ
# 環境ごとの接続情報は GitHub Environments の Secrets / Variables から解決される:
#   Secrets:   AZURE_STATIC_WEB_APPS_API_TOKEN
#   Variables: VITE_API_URL（ビルド時にAPI/Socket.io接続先として埋め込まれる）

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - '.github/workflows/azure-static-web-apps.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        type: choice
        options:
          - development
          - production
        default: development

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment:
      # push 起点は development 固定、手動実行は選択された環境
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/src/frontend"
          api_location: ""
          output_location: "dist"
          app_build_command: "npm run build"
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
