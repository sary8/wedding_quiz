<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="結婚式・二次会で楽しむリアルタイムクイズアプリ。ルームコードを入力して、新郎新婦にまつわるクイズにスマホで参加しよう!" />
    <meta name="theme-color" content="#6B8F71" />
    <title>Wedding Quiz</title>
    <!-- 装飾書体（表示テキストは英字のみのため latin サブセットだけ配信）。
         preload + インライン@font-faceで CSS→フォント の直列ロードを解消し、
         LCP要素（h1タイトル）のフォントスワップを前倒しする -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/great-vibes-latin-400-normal.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/cormorant-infant-latin-400-normal.woff2" />
    <style>
      @font-face { font-family: 'Great Vibes'; font-style: normal; font-display: swap; font-weight: 400; src: url(/fonts/great-vibes-latin-400-normal.woff2) format('woff2'); unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
      @font-face { font-family: 'Cormorant Infant'; font-style: normal; font-display: swap; font-weight: 400; src: url(/fonts/cormorant-infant-latin-400-normal.woff2) format('woff2'); unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
    </style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"
      ><!--
        静的アプリシェル: React 起動を待たずに JoinPage と同一の見た目を描画して FCP/LCP を早める。
        構造・クラスは src/pages/participant/JoinPage.tsx のレンダリング結果と一致させること
        （ズレると React 初回 render での置換時にレイアウトシフト = CLS が発生する）。
        エントランスアニメーション（animate-fade-up 等）はこのシェル側だけに付ける。
        React 版に付けると置換時に再生し直されてチラつく。
      --><div class="min-h-[100dvh] flex flex-col items-center justify-center px-6 bg-botanical overflow-hidden">
        <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
          <span class="absolute text-primary/[0.07] motion-safe:animate-[gentle-float_6s_ease-in-out_infinite]" style="left:20%;top:15%;font-size:40px">&#x1F33F;</span>
          <span class="absolute text-primary/[0.07] motion-safe:animate-[gentle-float_6s_ease-in-out_infinite]" style="left:50%;top:40%;animation-delay:2s;font-size:56px">&#x1F33F;</span>
          <span class="absolute text-primary/[0.07] motion-safe:animate-[gentle-float_6s_ease-in-out_infinite]" style="left:80%;top:65%;animation-delay:4s;font-size:72px">&#x1F33F;</span>
        </div>
        <header class="text-center mb-10 relative z-10 animate-fade-up">
          <h1 class="font-script text-7xl text-shimmer mb-2 [text-wrap:balance] drop-shadow-[0_2px_8px_rgba(107,143,113,0.15)]">Wedding Quiz</h1>
          <div class="gold-line w-48 mx-auto my-4"></div>
          <p class="font-serif-wedding text-sage-text/60 tracking-[0.25em] text-sm uppercase">Celebration Game</p>
        </header>
        <div class="w-full max-w-xs glass-card-strong rounded-3xl p-8 relative z-10 animate-fade-up" style="animation-delay:0.15s">
          <div class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
              <label class="text-base font-medium text-white">ルームコード（6桁）</label>
              <input class="px-6 py-4 rounded-2xl border-2 text-center text-lg border-white bg-white text-3xl tracking-[0.3em] font-bold" placeholder="XXXXXX" maxlength="6" inputmode="numeric" disabled />
            </div>
            <button type="submit" class="font-bold duration-200 disabled:cursor-not-allowed bg-accent text-dark disabled:opacity-60 px-12 py-4 text-xl rounded-2xl min-h-[44px] w-full" disabled>参加する</button>
          </div>
        </div>
        <p class="mt-10 text-primary/50 text-xs font-serif-wedding tracking-widest relative z-10 animate-fade-in" style="animation-delay:0.5s">本日はご参加いただきありがとうございます</p>
      </div
    ></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
